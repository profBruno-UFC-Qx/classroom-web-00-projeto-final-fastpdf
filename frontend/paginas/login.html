<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
<link rel="stylesheet" href="../site/css/login.css">
</head>
<body>

<div class="container">

    <div class="left">
        <div class="left-content">
            <h1>Gestão Escolar <br> Descomplicada e <br> Confiável.</h1>
            <p>
                Emita relatórios e acompanhe as finanças da sua instituição 
                com a segurança e clareza que você precisa.
            </p>
        </div>
    </div>

    <div class="right">
        <div class="login-box">
            <h2>Bem-vindo de volta</h2>
            <p>Acesse sua conta para gerenciar sua escola.</p>

            <form>
                <label>E-mail</label>
                <input type="email" placeholder="admin@escola.com.br">

                <label>Senha</label>
                <input type="password" placeholder="••••••••">

                <button type="submit">Entrar →</button>
            </form>

            <span class="register">
                Ainda não tem conta? <a href="#">Cadastre-se</a>
            </span>
        </div>
    </div>

</div>
</body>
</html>
